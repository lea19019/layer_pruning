# Recipe: Moslem-style iterative pruning + LoRA fine-tuning.
# Equivalent CLI: attention-lp run --exp-id my_heur \
#   --pruning heuristic --target-layers 24 --finetune --epochs 3
experiment_id: my_heur
description: "Heuristic prune to 24 layers + LoRA FT"
base_model: CohereForAI/aya-expanse-8b
seed: 42
lang_pair: cs-de
pruning:
  method: heuristic
  target_layers: 24       # number of layers to KEEP
  val_size: 200
finetuning:
  enabled: true
  epochs: 3
  qlora: false
distillation:
  enabled: false
quantization:
  enabled: false
